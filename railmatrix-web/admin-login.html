<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — RailMatrix</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page { min-height: 100vh; display: grid; place-items: center; padding: 80px 20px; }
    .auth-card { background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 48px; width: 100%; max-width: 440px; backdrop-filter: blur(20px); box-shadow: 0 32px 80px rgba(0,0,0,0.8); animation: fadeUp 0.5s ease; border-top: 4px solid var(--red); }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .icon { width: 56px; height: 56px; background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); border-radius: 16px; display: grid; place-items: center; font-size: 28px; margin: 0 auto 12px; }
    .auth-logo h1 { font-size: 1.5rem; font-weight: 800; color: white; }
    .auth-logo p  { color: var(--red); font-size: 0.88rem; margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .form-stack { display: flex; flex-direction: column; gap: 16px; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand"><div class="logo-icon">🚆</div>RailMatrix</a>
  </nav>
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="icon">🛡️</div>
        <h1>Admin Portal</h1>
        <p>Restricted Access</p>
      </div>
      <div id="login-alert" class="alert"></div>
      <div class="form-stack">
        <div class="field">
          <label>Admin Email</label>
          <input id="email" class="input" type="email" placeholder="admin@railmatrix.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="password" class="input" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button id="login-btn" class="btn btn-primary w-full" style="margin-top:8px; background:var(--red); border-color:var(--red);" onclick="doAdminLogin()">Access Portal</button>
      </div>
      <div class="divider">Return</div>
      <p class="text-center" style="font-size:0.88rem;color:var(--text-muted);">
        <a href="index.html" style="color:var(--accent);font-weight:600;">Go to User Site</a>
      </p>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script>
    if (AdminAuth.isLoggedIn()) window.location.href = 'admin-dashboard.html';
    
    ['email','password'].forEach(id =>
      document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doAdminLogin(); })
    );

    async function doAdminLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showAlert('login-alert','Please enter both email and password.'); return; }
      
      setLoading('login-btn', true, 'Authenticating...');
      try {
        const data = await AdminAPI.login(email, password);
        AdminAuth.save(data.token, { email: email, role: 'ADMIN' });
        showAlert('login-alert', 'Authentication successful. Entering portal...', 'success');
        setTimeout(() => window.location.href = 'admin-dashboard.html', 800);
      } catch (err) {
        showAlert('login-alert', err.message);
      } finally {
        setLoading('login-btn', false, 'Access Portal');
      }
    }
  </script>
</body>
</html>
