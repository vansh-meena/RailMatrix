<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — RailMatrix</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page { min-height: 100vh; display: grid; place-items: center; padding: 100px 20px 60px; }
    .auth-card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 48px; width: 100%; max-width: 460px; backdrop-filter: blur(20px); box-shadow: 0 32px 80px rgba(0,0,0,0.5); animation: fadeUp 0.5s ease; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .icon { width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 16px; display: grid; place-items: center; font-size: 28px; margin: 0 auto 12px; }
    .form-stack { display: flex; flex-direction: column; gap: 16px; margin-top: 28px; }
    .req-check { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-dim); transition: color 0.2s; }
    .req-check.ok { color: var(--green); }
    .reqs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand"><div class="logo-icon">🚆</div>RailMatrix</a>
    <div class="navbar-actions"><a href="login.html" class="btn btn-ghost btn-sm">Log in</a></div>
  </nav>
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="icon">🚆</div>
        <h1 style="font-size:1.5rem;font-weight:800;">Create your account</h1>
        <p style="color:var(--text-muted);font-size:0.88rem;margin-top:4px;">Start booking trains in minutes</p>
      </div>
      <div id="reg-alert" class="alert"></div>
      <div class="form-stack">
        <div class="field">
          <label>Full Name</label>
          <input id="name" class="input" type="text" placeholder="Vansh Meena" autocomplete="name">
        </div>
        <div class="field">
          <label>Email address</label>
          <input id="email" class="input" type="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="password" class="input" type="password" placeholder="Create a strong password" oninput="checkStrength(this.value)">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="reqs">
            <div class="req-check" id="r-len">○ 8+ characters</div>
            <div class="req-check" id="r-upper">○ Uppercase letter</div>
            <div class="req-check" id="r-num">○ Number</div>
            <div class="req-check" id="r-special">○ Special character</div>
          </div>
        </div>
        <button id="reg-btn" class="btn btn-primary w-full" style="margin-top:8px;" onclick="doRegister()">Create Account</button>
      </div>
      <div class="divider">or</div>
      <p class="text-center" style="font-size:0.88rem;color:var(--text-muted);">
        Already have an account? <a href="login.html" style="color:var(--accent);font-weight:600;">Log in</a>
      </p>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';
    function checkStrength(pw) {
      const checks = {
        'r-len':     pw.length >= 8,
        'r-upper':   /[A-Z]/.test(pw),
        'r-num':     /[0-9]/.test(pw),
        'r-special': /[^A-Za-z0-9]/.test(pw)
      };
      let score = Object.values(checks).filter(Boolean).length;
      const fill = document.getElementById('strength-fill');
      fill.className = 'strength-fill';
      fill.classList.add(['w-0','w-25','w-50','w-75','w-100'][score]);
      Object.entries(checks).forEach(([id, ok]) => {
        const el = document.getElementById(id);
        if (el) { el.classList.toggle('ok', ok); el.textContent = (ok ? '✓ ' : '○ ') + el.textContent.slice(2); }
      });
      return score === 4;
    }
    async function doRegister() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!name || !email || !password) { showAlert('reg-alert','Please fill in all fields.'); return; }
      if (!checkStrength(password))     { showAlert('reg-alert','Password does not meet all requirements.'); return; }
      setLoading('reg-btn', true, 'Creating account...');
      try {
        await AuthAPI.register(name, email, password);
        showAlert('reg-alert', '✅ Account created! Please check your email to verify your account before logging in.', 'success');
        document.getElementById('reg-btn').disabled = true;
      } catch (err) {
        showAlert('reg-alert', err.message);
      } finally {
        if (!document.getElementById('reg-btn').disabled)
          setLoading('reg-btn', false, 'Create Account');
      }
    }
  </script>
</body>
</html>
