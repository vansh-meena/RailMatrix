<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNR Status — RailMatrix</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pnr-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 20px;
        }

        .pnr-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 48px;
            width: 100%;
            max-width: 560px;
            backdrop-filter: blur(20px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.5s ease;
        }

        .pnr-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .pnr-header .icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 16px;
            display: grid;
            place-items: center;
            font-size: 28px;
            margin: 0 auto 12px;
        }

        .pnr-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .pnr-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .search-row {
            display: flex;
            gap: 12px;
        }

        .search-row .input {
            flex: 1;
            font-size: 1.1rem;
            padding: 16px;
            text-transform: uppercase;
        }

        #pnr-result {
            margin-top: 32px;
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .result-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .res-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .res-pnr {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
        }

        .res-route {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .res-station {
            flex: 1;
        }

        .res-station-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .res-station-time {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .res-line {
            flex: 0 0 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-weight: bold;
        }

        .res-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.02);
            padding: 16px;
            border-radius: var(--radius-sm);
        }

        .meta-item .lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-item .val {
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 2px;
        }

        .pax-list {
            margin-top: 16px;
        }

        .pax-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed var(--border);
            font-size: 0.9rem;
        }

        .pax-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="logo-icon">🚆</div>RailMatrix
        </a>
        <ul class="navbar-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="pnr.html" class="active">PNR Status</a></li>
            <li><a href="dashboard.html" id="nav-dashboard" class="hidden">My Bookings</a></li>
        </ul>
        <div class="navbar-actions">
            <a href="login.html" class="btn btn-ghost btn-sm" id="nav-login">Log In</a>
            <a href="register.html" class="btn btn-primary btn-sm" id="nav-register">Sign Up</a>
            <span id="nav-username" style="font-size:0.88rem;color:var(--text-muted);margin-right:4px;"></span>
            <button class="btn btn-ghost btn-sm hidden" id="nav-logout">Logout</button>
        </div>
    </nav>
    <main class="pnr-page">
        <div class="pnr-card">
            <div class="pnr-header">
                <div class="icon">🔍</div>
                <h1>Check PNR Status</h1>
                <p>Enter your 12-character PNR number to get live booking details.</p>
            </div>

            <div id="pnr-alert" class="alert mb-24"></div>

            <div class="search-row">
                <input id="pnr-input" class="input" type="text" placeholder="e.g. RM2605748185" maxlength="12">
                <button id="pnr-btn" class="btn btn-primary" onclick="checkPNR()">Check Status</button>
            </div>
            <div id="pnr-result">
                <div class="result-box">
                    <div class="res-header">
                        <div class="res-pnr" id="r-pnr"></div>
                        <div id="r-status" class="badge"></div>
                    </div>
                    <div class="res-route">
                        <div class="res-station">
                            <div class="res-station-name" id="r-dep"></div>
                        </div>
                        <div class="res-line">→</div>
                        <div class="res-station" style="text-align:right;">
                            <div class="res-station-name" id="r-arr"></div>
                        </div>
                    </div>
                    <div class="res-meta">
                        <div class="meta-item">
                            <div class="lbl">Train</div>
                            <div class="val" id="r-train"></div>
                        </div>
                        <div class="meta-item">
                            <div class="lbl">Journey Date</div>
                            <div class="val" id="r-date"></div>
                        </div>
                        <div class="meta-item">
                            <div class="lbl">Booking Time</div>
                            <div class="val" id="r-time"></div>
                        </div>
                        <div class="meta-item">
                            <div class="lbl">Class / Quota</div>
                            <div class="val" id="r-class"></div>
                        </div>
                        <div class="meta-item">
                            <div class="lbl">Passengers</div>
                            <div class="val" id="r-pax-count"></div>
                        </div>
                    </div>
                    <div style="font-size:0.85rem;font-weight:700;color:var(--text-muted);margin-bottom:8px;">PASSENGER
                        DETAILS</div>
                    <div class="pax-list" id="r-pax-list"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script>
        updateNavbar();
        document.getElementById('pnr-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkPNR();
        });
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const pnrQuery = params.get('pnr');
            if (pnrQuery) {
                document.getElementById('pnr-input').value = pnrQuery;
                checkPNR();
            }
        });
        async function checkPNR() {
            const pnr = document.getElementById('pnr-input').value.trim().toUpperCase();
            const resDiv = document.getElementById('pnr-result');

            if (!pnr) { showAlert('pnr-alert', 'Please enter a valid PNR number.'); return; }
            if (pnr.length !== 12 || !pnr.startsWith('RM')) { showAlert('pnr-alert', 'Invalid PNR format. It should be 12 characters starting with RM.'); return; }
            setLoading('pnr-btn', true, 'Checking...');
            resDiv.style.display = 'none';
            try {
                const data = await BookingsAPI.getByPNR(pnr);

                document.getElementById('r-pnr').textContent = data.pnr;
                const statusEl = document.getElementById('r-status');
                statusEl.textContent = data.status;
                statusEl.className = `badge ${data.status === 'ACTIVE' ? 'badge-active' : 'badge-cancelled'}`;

                document.getElementById('r-dep').textContent = data.departure;
                document.getElementById('r-arr').textContent = data.destination;

                document.getElementById('r-train').textContent = data.trainName;
                document.getElementById('r-date').textContent = formatDate(data.journeyDate);
                document.getElementById('r-time').textContent = new Date(data.bookingTime).toLocaleString();
                document.getElementById('r-class').textContent = `${data.classCode} (${data.quotaCode})`;
                document.getElementById('r-pax-count').textContent = data.totalPassengers;

                const paxList = document.getElementById('r-pax-list');
                paxList.innerHTML = data.passengers.map(p => {
                    let statusText = p.status === 'WL' ? `Waitlist (WL ${p.wl_position})` : (p.status === 'CNF' ? 'Confirmed' : 'Cancelled');
                    let statusColor = p.status === 'WL' ? 'var(--orange)' : (p.status === 'CNF' ? 'var(--green)' : 'var(--red)');
                    return `
          <div class="pax-item" style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-weight:600;">${p.passenger_name}</div>
              <div style="font-size:0.8rem;color:var(--text-muted);">${p.age} yrs, ${p.gender}</div>
            </div>
            <div style="font-weight:700;color:${statusColor}">${statusText}</div>
          </div>
        `}).join('');
                resDiv.style.display = 'block';
            } catch (err) {
                showAlert('pnr-alert', err.message);
            } finally {
                setLoading('pnr-btn', false, 'Check Status');
            }
        }
    </script>
</body>

</html>
