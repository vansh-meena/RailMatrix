<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed — RailMatrix</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .confirm-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .ticket {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0;
            width: 100%;
            max-width: 520px;
            backdrop-filter: blur(20px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            position: relative;
        }

        /* Ticket perforation effect */
        .ticket::before,
        .ticket::after {
            content: '';
            position: absolute;
            top: 120px;
            width: 30px;
            height: 30px;
            background: var(--bg);
            border-radius: 50%;
        }

        .ticket::before {
            left: -15px;
            border-right: 1px solid var(--border);
        }

        .ticket::after {
            right: -15px;
            border-left: 1px solid var(--border);
        }

        .ticket-divider {
            border-top: 2px dashed rgba(255, 255, 255, 0.15);
            margin: 0;
            position: absolute;
            top: 135px;
            left: 20px;
            right: 20px;
        }

        .t-head {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 32px 40px;
            text-align: center;
            color: white;
            height: 135px;
        }

        .t-head .icon {
            font-size: 40px;
            margin-bottom: 8px;
            animation: pop 0.5s ease 0.3s backwards;
            display: inline-block;
        }

        .t-head h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .t-body {
            padding: 48px 40px 32px;
        }

        .pnr-box {
            background: rgba(167, 139, 250, 0.1);
            border: 1px dashed rgba(167, 139, 250, 0.4);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            margin-bottom: 24px;
        }

        .pnr-lbl {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .pnr-val {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: white;
            margin-top: 4px;
            font-family: monospace;
        }

        .t-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .t-item .lbl {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .t-item .val {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 4px;
        }

        .t-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
        }

        .t-total-lbl {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .t-total-val {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--green);
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            80% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="logo-icon">🚆</div>RailMatrix
        </a>
        <div class="navbar-actions">
            <span id="nav-username" style="font-size:0.88rem;color:var(--text-muted);margin-right:4px;"></span>
            <a href="dashboard.html" class="btn btn-ghost btn-sm">My Bookings</a>
        </div>
    </nav>
    <main class="confirm-page">
        <div class="ticket" id="ticket" style="display:none;">
            <div class="t-head">
                <div class="icon">✅</div>
                <h1>Booking Confirmed!</h1>
            </div>
            <div class="ticket-divider"></div>
            <div class="t-body">

                <div class="pnr-box">
                    <div class="pnr-lbl">Your PNR Number</div>
                    <div class="pnr-val" id="c-pnr"></div>
                </div>
                <div class="t-grid">
                    <div class="t-item">
                        <div class="lbl">Train</div>
                        <div class="val" id="c-train"></div>
                    </div>
                    <div class="t-item">
                        <div class="lbl">Journey Date</div>
                        <div class="val" id="c-date"></div>
                    </div>
                    <div class="t-item">
                        <div class="lbl">Booking ID</div>
                        <div class="val" id="c-bid"></div>
                    </div>
                    <div class="t-item">
                        <div class="lbl">Passengers</div>
                        <div class="val" id="c-pax"></div>
                    </div>
                </div>
                <div class="t-total">
                    <div class="t-total-lbl">Total Paid</div>
                    <div class="t-total-val" id="c-fare"></div>
                </div>
                <p style="text-align:center;color:var(--text-muted);font-size:0.85rem;margin-bottom:24px;">
                    A confirmation email has been sent to your registered email address.
                </p>
                <div class="actions">
                    <a href="dashboard.html" class="btn btn-primary" style="flex:1;">View My Bookings</a>
                    <button class="btn btn-ghost" style="flex:1;" onclick="window.print()">Print Ticket</button>
                </div>
            </div>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script>
        if (!Auth.isLoggedIn()) window.location.href = 'index.html';

        const user = Auth.user();
        document.getElementById('nav-username').textContent = user.name.split(' ')[0];
        window.addEventListener('load', () => {
            const raw = sessionStorage.getItem('rm_booking_confirm');
            if (!raw) {
                window.location.href = 'dashboard.html';
                return;
            }
            const data = JSON.parse(raw);

            document.getElementById('c-pnr').textContent = data.pnr || 'N/A';
            document.getElementById('c-train').textContent = data.trainName;
            document.getElementById('c-date').textContent = formatDate(data.journeyDate);
            document.getElementById('c-bid').textContent = `#${data.bookingId}`;
            document.getElementById('c-pax').textContent = `${data.totalPassengers} Person(s)`;
            document.getElementById('c-fare').textContent = `₹${data.totalFare}`;
            document.getElementById('ticket').style.display = 'block';
            // Clear from session storage so a refresh doesn't show it again
            sessionStorage.removeItem('rm_booking_confirm');
        });
    </script>
</body>

</html>
