<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed — RailMatrix</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .confirm-page { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; text-align: center; }
    .success-icon { width: 96px; height: 96px; background: rgba(34, 197, 94, 0.1); color: var(--green); border: 2px solid rgba(34, 197, 94, 0.2); border-radius: 50%; display: grid; place-items: center; font-size: 48px; margin-bottom: 32px; animation: scaleUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes scaleUp {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .confirm-card { background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-top: 4px solid var(--green); border-radius: var(--radius-xl); padding: 48px; width: 100%; max-width: 540px; backdrop-filter: blur(20px); box-shadow: 0 32px 80px rgba(0,0,0,0.8); animation: fadeUp 0.5s ease 0.2s both; }
    
    .pnr-box { background: #111; border: 1px dashed rgba(255,255,255,0.2); border-radius: var(--radius-lg); padding: 24px; margin: 32px 0; }
    .pnr-label { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 8px; }
    .pnr-value { font-size: 2.5rem; font-family: monospace; font-weight: 800; color: white; letter-spacing: 4px; }
    
    .action-buttons { display: flex; gap: 16px; justify-content: center; }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  
  <main class="confirm-page">
    <div class="success-icon">✓</div>
    
    <div class="confirm-card">
      <h1 style="font-size:2rem; font-weight:800; color:white; margin-bottom:12px;">Booking Confirmed!</h1>
      <p style="color:var(--text-muted); font-size:1.1rem; line-height:1.6;">
        Your train ticket has been successfully booked. A confirmation email has been sent to your registered address.
      </p>
      
      <div class="pnr-box">
        <div class="pnr-label">Your PNR Number</div>
        <div class="pnr-value" id="final-pnr">LOADING...</div>
      </div>
      
      <div class="action-buttons">
        <button id="view-pnr-btn" class="btn btn-primary" onclick="viewPNR()">View Ticket Status</button>
        <button class="btn btn-ghost" onclick="window.location.href='dashboard.html'">Go to Dashboard</button>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    if (!Auth.isLoggedIn()) { window.location.href = 'index.html'; }

    let pnrNumber = '';

    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      pnrNumber = urlParams.get('pnr');
      
      if (pnrNumber) {
        document.getElementById('final-pnr').textContent = pnrNumber;
      } else {
        document.getElementById('final-pnr').textContent = 'ERROR';
        document.getElementById('final-pnr').style.color = 'var(--red)';
      }
    });

    function viewPNR() {
      if (pnrNumber) {
        window.location.href = `pnr.html?pnr=${pnrNumber}`;
      }
    }
  </script>
</body>
</html>
